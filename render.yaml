services:
  - type: web
    name: home-care-family-app
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/status
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: home_care_shared_data
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
