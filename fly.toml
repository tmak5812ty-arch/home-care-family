app = "home-care-family-app"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "4173"
  OPENAI_MODEL = "gpt-5-mini"
  DATA_DIR = "/data"

[http_service]
  internal_port = 4173
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "home_care_data"
  destination = "/data"
